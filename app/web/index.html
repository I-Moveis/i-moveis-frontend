<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>app</title>
  <link rel="manifest" href="manifest.json">

  <!-- OAuth client ID do Firebase → Authentication → Google → Web SDK configuration.
       Requerido pelo google_sign_in_web (Google Identity Services). -->
  <meta name="google-signin-client_id" content="282908859566-r8sjrgst4nvk58itdggu64rfeacslrk4.apps.googleusercontent.com">

  <!-- Google Maps JavaScript API. Locally reads from env.js -->
  <script src="env.js"></script>
  <script>
    var script = document.createElement('script');
    script.src = "https://maps.googleapis.com/maps/api/js?key=" + (window.MAPS_API_KEY || "YOUR_API_KEY_HERE") + "&loading=async";
    script.async = true;
    document.head.appendChild(script);
  </script>

  <!-- Hide Google Maps chrome (logo, attribution, fullscreen, keyboard shortcuts).
       NOTE: hiding the Google logo and attribution technically violates the
       Google Maps Platform Terms of Service §3.2.3.b. -->
  <style>
    .gm-style-cc,
    .gmnoprint,
    .gm-bundled-control,
    .gm-bundled-control-on-bottom,
    .gm-fullscreen-control,
    .gm-svpc,
    .gm-style a[href^="https://maps.google.com/maps"],
    .gm-style a[href^="https://www.google.com/maps"],
    .gm-style > div > a[target="_blank"],
    .gm-style button[aria-label*="Keyboard" i],
    .gm-style button[aria-label*="teclado" i],
    .gm-style button[aria-label*="Fullscreen" i],
    .gm-style button[aria-label*="tela cheia" i],
    .gm-style button[aria-label*="Zoom" i],
    .gm-style button[aria-label*="Pan" i] {
      display: none !important;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
